services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j_graphrag
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
      - ./neo4j/import:/var/lib/neo4j/import
      - ./neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password123 # Username/Password
      - NEO4J_PLUGINS=["apoc"] # Optional: APOC plugin
